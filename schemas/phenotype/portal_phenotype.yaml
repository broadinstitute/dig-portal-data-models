id: https://kp.a2f.org/portal-phenotype-model
name: portal-phenotype-model
title: A2F Knowledge Portal Phenotype Data Model
description: >-
  Unified data model for phenotypes tracked in the A2F Knowledge Portal,
  with stable numeric IDs, legacy identifiers, trait type classification,
  and cross-ontology mappings following SSSOM conventions.
version: "0.1.0"

prefixes:
  portal: https://kp.a2f.org/phenotype/
  linkml: https://w3id.org/linkml/
  skos: http://www.w3.org/2004/02/skos/core#
  sssom: https://w3id.org/sssom/
  semapv: https://w3id.org/semapv/vocab/
  efo: http://www.ebi.ac.uk/efo/
  mondo: http://purl.obolibrary.org/obo/MONDO_
  mesh: http://id.nlm.nih.gov/mesh/
  hp: http://purl.obolibrary.org/obo/HP_
  doid: http://purl.obolibrary.org/obo/DOID_
  ordo: http://www.orpha.net/ORDO/Orphanet_
  chebi: http://purl.obolibrary.org/obo/CHEBI_
  oba: http://purl.obolibrary.org/obo/OBA_
  cmo: http://purl.obolibrary.org/obo/CMO_
  icd10cm: http://purl.bioontology.org/ontology/ICD10CM/

default_range: string

imports:
  - linkml:types

classes:
  PortalPhenotypeCollection:
    description: A collection of portal phenotype records.
    tree_root: true
    attributes:
      phenotypes:
        range: PortalPhenotype
        multivalued: true
        inlined_as_list: true

  PortalPhenotype:
    description: >-
      A phenotype tracked in the A2F Knowledge Portal, with a stable numeric ID,
      legacy identifiers, classification, and cross-ontology mappings.
    attributes:
      portal_id:
        range: string
        required: true
        identifier: true
        description: "Stable numeric ID (e.g., PORTAL:0000001)"
        pattern: "^PORTAL:\\d{7}$"
      legacy_id:
        range: string
        required: true
        description: "Original text-based phenotype ID from Phenotypes.tsv"
      gwas_source_category:
        range: GwasSourceCategoryEnum
        required: true
        description: "Source collection the phenotype originated from (portal, gcat_trait, rare_v2)"
      phenotype_name:
        range: string
        required: true
        description: "Human-readable phenotype label"
      description:
        range: string
        description: "Extended description if available"
      legacy_trait_group:
        range: string
        description: "Original display_group from Phenotypes.tsv (e.g., ECG_TRAITS, ATRIAL_FIBRILLATION)"
      trait_group:
        range: TraitGroupCategoryEnum
        required: true
        description: "Standardized biological trait group (consolidated from legacy_trait_group)"
      trait_type:
        range: TraitTypeEnum
        required: true
      is_dichotomous:
        range: boolean
        description: "Whether this is a case/control (dichotomous) phenotype"
      component_phenotypes:
        range: string
        multivalued: true
        description: "For composite/interaction phenotypes, PORTAL IDs of the component phenotypes"
      primary_mapping:
        range: OntologyMapping
        inlined: true
        description: "The single best ontology mapping for this phenotype"
      mappings:
        range: OntologyMapping
        multivalued: true
        inlined_as_list: true
        description: "All cross-ontology mappings"

  OntologyMapping:
    description: >-
      A mapping from a portal phenotype to an external ontology term,
      following SSSOM conventions.
    attributes:
      target_id:
        range: uriorcurie
        required: true
        description: "External ontology ID (e.g., EFO:0000275, MESH:D001281)"
      target_label:
        range: string
        description: "Human-readable label of the target term"
      target_ontology:
        range: OntologyEnum
        required: true
      mapping_predicate:
        range: MappingPredicateEnum
        required: true
        description: "SKOS predicate describing the relationship"
      mapping_justification:
        range: MappingJustificationEnum
        description: "How this mapping was determined"
      confidence:
        range: float
        minimum_value: 0.0
        maximum_value: 1.0
        description: "Confidence score (1.0 = manually curated exact match)"
      source:
        range: string
        description: "Which source file or process produced this mapping"
      notes:
        range: string
        description: "Additional notes or justification"

enums:
  GwasSourceCategoryEnum:
    description: "Source collection the phenotype originated from"
    permissible_values:
      portal:
        description: "Core portal phenotype"
      gcat_trait:
        description: "GWAS Catalog-sourced trait"
      rare_v2:
        description: "Rare disease from Orphanet"

  TraitGroupCategoryEnum:
    description: >-
      Standardized biological trait group. Consolidates 55 legacy display_groups
      into 30 well-defined categories based on biological system or domain.
    permissible_values:
      aging:
        description: "Aging, longevity, and lifespan traits. Legacy: AGING_AND_LONGEVITY"
      anthropometric:
        description: "Body measurements, composition, and physical activity. Legacy: ANTHROPOMETRIC, GIANT_PHENOTYPES, PHYSICAL_ACTIVITY"
      cancer:
        description: "All neoplasms and cancer types. Legacy: CANCER"
      cardiovascular:
        description: "Heart, vasculature, ECG, atrial fibrillation, stroke, cerebrovascular. Legacy: CARDIOVASCULAR, ECG_TRAITS, ATRIAL_FIBRILLATION, STROKE, VASCULAR, CEREBROVASCULAR_MRI_TRAITS, HERMES_PHENOTYPES"
      congenital:
        description: "Congenital anomalies, chromosomal abnormalities, developmental disorders. Legacy: DEVELOPMENTAL, GENETIC, NEPHBCH"
      dental:
        description: "Dental and oral health traits. Legacy: DENTAL"
      dermatological:
        description: "Skin conditions and dermatological traits. Legacy: DERMATOLOGICAL, SKIN_CONDITIONS, SKIN_KNOWLEDGE_PORTAL"
      digestive:
        description: "Gastrointestinal and inflammatory bowel diseases. Legacy: DIGESTIVE, INFLAMMATORY_BOWEL"
      endocrine:
        description: "Endocrine and hormonal traits. Legacy: ENDOCRINE"
      ent:
        description: "Ear, nose, and throat (hearing, otolaryngological). Legacy: HEARING, OTOLARYNGOLOGICAL"
      environmental:
        description: "Environmental exposures and toxicology measurements. Legacy: ENVIRONMENTAL_EXPOSURE"
      hematological:
        description: "Blood and blood-forming tissue measurements. Legacy: HEMATOLOGICAL"
      hepatic:
        description: "Liver and hepatobiliary traits. Legacy: HEPATIC"
      immunological:
        description: "Immune system traits and autoimmune conditions. Legacy: IMMUNOLOGICAL"
      infectious:
        description: "Infectious diseases including COVID-19. Legacy: INFECTIOUS, COVID-19"
      lipids:
        description: "Lipid and cholesterol measurements. Legacy: LIPIDS, IGVF_LIPIDS"
      metabolic:
        description: "Metabolic traits, glycemic measures, diabetic complications. Legacy: METABOLIC, GLYCEMIC, DIABETIC_COMPLICATIONS, TYPE_1_DIABETES"
      metabolite:
        description: "Metabolite and small molecule measurements. Legacy: METABOLITE"
      musculoskeletal:
        description: "Bone, muscle, and joint traits. Legacy: MUSCULOSKELETAL"
      neurological:
        description: "Neurological and cognitive traits. Legacy: NEUROLOGICAL, COGNITIVE"
      nutritional:
        description: "Nutritional status and dietary biomarkers. Legacy: NUTRITIONAL"
      ocular:
        description: "Eye and vision traits. Legacy: OCULAR, VISION_GENOMICS"
      pharmacogenomics:
        description: "Drug response and pharmacogenomic traits. Legacy: PHARMACOGENOMICS, SULFONYLUREA_RESPONSE, METFORMIN_RESPONSE"
      protein_biology:
        description: "Protein level measurements in blood. Legacy: PROTEIN_BIOLOGY"
      psychiatric:
        description: "Psychiatric and behavioral traits. Legacy: PSYCHIATRIC"
      renal:
        description: "Kidney and urological traits. Legacy: RENAL"
      reproductive:
        description: "Reproductive and fertility traits. Legacy: REPRODUCTIVE_TRAITS"
      respiratory:
        description: "Lung and respiratory traits. Legacy: LUNG"
      sleep:
        description: "Sleep, circadian rhythm, and fatigue traits. Legacy: SLEEP_AND_CIRCADIAN, PRIVATE_SLEEP_PORTAL"
      other:
        description: "Traits not fitting other categories. Legacy: NON-ADDITIVE_MODELS, OTHER"

  TraitTypeEnum:
    permissible_values:
      disease:
        description: "A diagnosable disease or condition"
      measurement:
        description: "A quantitative measurement or biomarker"
      phenotype:
        description: "An observable characteristic (not disease or measurement)"
      rare_disease:
        description: "Rare disease from Orphanet registry"
      interaction:
        description: "Gene-environment or trait-trait interaction (e.g., AFxBMI)"
      stratified:
        description: "Trait within a subpopulation (e.g., AlbInT2D)"
      adjusted:
        description: "Trait adjusted for covariates (e.g., ISIadjAgeSexBMI)"
      subgroup:
        description: "Age/sex/ancestry-specific subgroup analysis"
      composite:
        description: "Combined or alternative phenotype definitions (e.g., AD_or_AD_history)"

  OntologyEnum:
    permissible_values:
      EFO:
        description: "Experimental Factor Ontology"
      MESH:
        description: "Medical Subject Headings"
      MONDO:
        description: "Mondo Disease Ontology"
      HP:
        description: "Human Phenotype Ontology"
      DOID:
        description: "Disease Ontology"
      ORPHANET:
        description: "Orphanet Rare Disease Ontology"
      CHEBI:
        description: "Chemical Entities of Biological Interest"
      OBA:
        description: "Ontology of Biological Attributes"
      CMO:
        description: "Clinical Measurement Ontology"
      ICD10CM:
        description: "ICD-10 Clinical Modification"

  MappingPredicateEnum:
    permissible_values:
      "skos:exactMatch":
        description: "Exact semantic equivalence"
      "skos:closeMatch":
        description: "Sufficiently similar to be used interchangeably in some contexts"
      "skos:broadMatch":
        description: "Target is broader/more general than the portal phenotype"
      "skos:narrowMatch":
        description: "Target is narrower/more specific than the portal phenotype"
      "skos:relatedMatch":
        description: "Associative mapping (e.g., component of a composite phenotype)"

  MappingJustificationEnum:
    permissible_values:
      manual_curation:
        description: "Manually curated by a domain expert"
        meaning: semapv:ManualMappingCuration
      lexical_match:
        description: "Automated exact or fuzzy text match"
        meaning: semapv:LexicalMatching
      cross_reference:
        description: "Extracted from ontology cross-references (hasDbXref)"
        meaning: semapv:MappingByLogicalReasoning
      semantic_similarity:
        description: "Embedding-based similarity search"
        meaning: semapv:SemanticSimilarityThresholdMatching
      gwas_catalog:
        description: "Derived from GWAS Catalog MAPPED_TRAIT_URI"
        meaning: semapv:MappingByLogicalReasoning
      inherited:
        description: "Inherited from a prior mapping file (portal_to_mesh or AMP)"
        meaning: semapv:ManualMappingCuration
